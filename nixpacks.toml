# Nixpacks configuration for Railway
# Single service: builds the immersive web app + NestJS API, then serves both.

[phases.setup]
# git-lfs so the large 3D assets (models/textures/HDRI) are fetched, not left
# as LFS pointer files, before the web build runs.
nixPkgs = ["nodejs_22", "pnpm", "git-lfs"]

[phases.install]
cmds = [
  "git lfs install --local",
  "git lfs pull",
  "pnpm install --frozen-lockfile",
]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "node apps/api/dist/main.js"
