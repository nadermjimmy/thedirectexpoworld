services:
  web:
    build:
      context: ../
      dockerfile: infra/Dockerfile.web
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web:/app/apps/web
    command: pnpm --filter @immersive/web dev --host

  api:
    build:
      context: ../
      dockerfile: infra/Dockerfile.api
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    volumes:
      - ../apps/api:/app/apps/api
    command: pnpm --filter @immersive/api dev
